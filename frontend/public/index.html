<!-- Purpose: Static React application for Feijoa fruit classification and quality prediction. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#173f35" />
    <title>Feijoa Quality</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              canopy: "#173f35",
              leaf: "#2f7d55",
              rind: "#89b36b",
              pulp: "#f1d96b",
              ember: "#c75a3a",
              ink: "#15231f",
              mist: "#f6f7f1",
            },
            boxShadow: { soft: "0 18px 50px rgba(21, 35, 31, 0.12)" },
          },
        },
      };
      window.FEJOA_API_URL = "__API_URL__";
    </script>
    <style>
      body {
        margin: 0;
        color: #15231f;
        background:
          linear-gradient(90deg, rgba(47, 125, 85, 0.06) 1px, transparent 1px),
          linear-gradient(180deg, rgba(47, 125, 85, 0.06) 1px, transparent 1px),
          #f6f7f1;
        background-size: 32px 32px;
      }
      .panel {
        border: 1px solid rgba(23, 63, 53, 0.1);
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(21, 35, 31, 0.12);
      }
      .focus-ring:focus {
        outline: 2px solid #2f7d55;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;
      const API_BASE = window.FEJOA_API_URL || "http://localhost:8000";
      const api = axios.create({ baseURL: API_BASE });

      function describeApiError(error, fallback) {
        const detail = error.response?.data?.detail;
        if (detail) return Array.isArray(detail) ? JSON.stringify(detail) : detail;
        if (error.response?.status) return `${fallback} API returned ${error.response.status}.`;
        if (error.request) return `${fallback} Could not reach API at ${API_BASE}.`;
        return `${fallback} ${error.message || ""}`.trim();
      }

      const navItems = [
        ["home", "Home"],
        ["results", "Results"],
        ["history", "History"],
      ];

      const targetLabels = [
        ["weight_loss_pct", "Weight loss", "%", "border-ember/30 bg-ember/10 text-ember"],
        ["wvtr_g_m2_day", "WVTR", "g/m2/day", "border-canopy/15 bg-white text-canopy"],
        ["o2_pct", "O2", "%", "border-leaf/25 bg-leaf/5 text-leaf"],
        ["co2_pct", "CO2", "%", "border-pulp/70 bg-pulp/20 text-canopy"],
        ["rh_pct", "RH", "%", "border-canopy/15 bg-white text-canopy"],
        ["firmness_N", "Firmness", "N", "border-leaf/25 bg-leaf/5 text-leaf"],
      ];

      const qualityInitialForm = {
        time_days: 14,
        temperature: 12,
        perforations: 2,
        a_star: -1.2,
        b_star: 16.5,
        lightness_L: 69.3,
      };

      const qualityFields = [
        ["time_days", "Storage days", 0, 35, 1],
        ["temperature", "Temperature", 6, 17, 1],
        ["perforations", "Perforations", 0, 3, 1],
        ["a_star", "a*", -15, 15, 0.1],
        ["b_star", "b*", 0, 35, 0.1],
        ["lightness_L", "Lightness L*", 40, 85, 0.1],
      ];

      function Icon({ name }) {
        const paths = {
          Home: "M3 10.5 12 3l9 7.5V21h-6v-6H9v6H3Z",
          Predict: "M4 19V5 M4 19h18 M8 16l4-5 4 3 5-8",
          Results: "M4 19V5 M4 19h18 M8 16l4-5 4 3 5-8",
          History: "M12 6v6l4 2 M21 12a9 9 0 1 1-3-6.7",
          Upload: "M12 16V4 M7 9l5-5 5 5 M5 20h14",
        };
        return (
          <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d={paths[name] || paths.Home}></path>
          </svg>
        );
      }

      function MetricCard({ label, value, unit, tone = "border-canopy/15 bg-white text-canopy" }) {
        return (
          <div className={`rounded-md border p-4 ${tone}`}>
            <p className="text-xs font-semibold uppercase opacity-80">{label}</p>
            <p className="mt-2 text-2xl font-semibold">
              {value}
              {unit ? <span className="ml-1 text-sm font-medium opacity-75">{unit}</span> : null}
            </p>
          </div>
        );
      }

      function SvgCurve({ data }) {
        const series = [
          ["weight_loss_pct", "#c75a3a"],
          ["wvtr_g_m2_day", "#6b7c59"],
          ["o2_pct", "#2f7d55"],
          ["co2_pct", "#d1a935"],
          ["rh_pct", "#2d6f91"],
          ["firmness_N", "#173f35"],
        ];
        if (!data.length) {
          return <p className="rounded-md bg-white p-6 text-sm text-ink/65">Waiting for curve data.</p>;
        }

        const width = 900;
        const height = 330;
        const pad = 34;
        const allValues = series.flatMap(([key]) => data.map((point) => Number(point[key])));
        const minY = Math.min(...allValues);
        const maxY = Math.max(...allValues);
        const x = (day) => pad + (day / 35) * (width - pad * 2);
        const y = (value) => height - pad - ((value - minY) / (maxY - minY || 1)) * (height - pad * 2);
        const pathFor = (key) =>
          data.map((point, index) => `${index === 0 ? "M" : "L"} ${x(point.time_days)} ${y(Number(point[key]))}`).join(" ");

        return (
          <div>
            <svg viewBox={`0 0 ${width} ${height}`} className="h-full w-full rounded-md bg-white">
              {[0, 1, 2, 3, 4].map((line) => {
                const yy = pad + line * ((height - pad * 2) / 4);
                return <line key={line} x1={pad} x2={width - pad} y1={yy} y2={yy} stroke="#d9e4d5" strokeDasharray="4 5" />;
              })}
              <line x1={pad} x2={width - pad} y1={height - pad} y2={height - pad} stroke="#173f35" opacity="0.45" />
              <line x1={pad} x2={pad} y1={pad} y2={height - pad} stroke="#173f35" opacity="0.45" />
              {series.map(([key, color]) => <path key={key} d={pathFor(key)} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" />)}
              <text x={pad} y={height - 8} fill="#173f35" fontSize="13">0 days</text>
              <text x={width - pad - 50} y={height - 8} fill="#173f35" fontSize="13">35 days</text>
            </svg>
            <div className="mt-3 flex flex-wrap gap-3 text-xs text-canopy/75">
              {series.map(([key, color]) => (
                <span key={key} className="inline-flex items-center gap-2">
                  <span className="h-2.5 w-2.5 rounded-full" style={{ background: color }}></span>
                  {key}
                </span>
              ))}
            </div>
          </div>
        );
      }

      function QualityPredictionPanel({ autoRun = false, intro = "", title = "Quality prediction" }) {
        const [form, setForm] = useState(qualityInitialForm);
        const [result, setResult] = useState(null);
        const [curve, setCurve] = useState([]);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const updateField = (key, value) => setForm((current) => ({ ...current, [key]: Number(value) }));
        const submit = async () => {
          setLoading(true);
          setError("");
          try {
            const [predictionResponse, curveResponse] = await Promise.all([
              api.post("/predict/quality", form),
              api.get("/predict/quality/curve", { params: {
                temperature: form.temperature,
                perforations: form.perforations,
                a_star: form.a_star,
                b_star: form.b_star,
                lightness_L: form.lightness_L,
              }}),
            ]);
            setResult(predictionResponse.data);
            setCurve(curveResponse.data);
          } catch (err) {
            setError(describeApiError(err, "Quality prediction failed."));
          } finally {
            setLoading(false);
          }
        };
        useEffect(() => { if (autoRun) submit(); }, [autoRun]);

        return (
          <div className="grid gap-6 xl:grid-cols-[420px_1fr]">
            <section className="panel p-6">
              <h2 className="text-2xl font-semibold text-canopy">{title}</h2>
              {intro ? <p className="mt-3 text-sm leading-6 text-ink/70">{intro}</p> : null}
              <div className="mt-5 space-y-4">
                {qualityFields.map(([key, label, min, max, step]) => (
                  <label key={key} className="block">
                    <div className="mb-2 flex items-center justify-between gap-3 text-sm">
                      <span className="font-semibold text-canopy">{label}</span>
                      <input type="number" min={min} max={max} step={step} value={form[key]} onChange={(event) => updateField(key, event.target.value)} className="focus-ring w-28 rounded-md border border-canopy/15 bg-white px-2 py-1 text-right" />
                    </div>
                    <input type="range" min={min} max={max} step={step} value={form[key]} onChange={(event) => updateField(key, event.target.value)} className="w-full accent-leaf" />
                  </label>
                ))}
              </div>
              <button type="button" onClick={submit} disabled={loading} className="focus-ring mt-6 inline-flex w-full items-center justify-center gap-2 rounded-md bg-canopy px-4 py-3 font-semibold text-white transition hover:bg-leaf disabled:cursor-not-allowed disabled:opacity-50">
                <Icon name="Predict" />{loading ? "Predicting..." : "Predict quality"}
              </button>
              {error ? <p className="mt-3 text-sm font-medium text-ember">{error}</p> : null}
            </section>
            <section className="space-y-6">
              <div className="panel p-6">
                <h2 className="text-2xl font-semibold text-canopy">Quality values</h2>
                {result ? (
                  <div className="mt-5 grid gap-3 sm:grid-cols-2 lg:grid-cols-3">
                    {targetLabels.map(([key, label, unit, tone]) => <MetricCard key={key} label={label} value={Number(result[key]).toFixed(3)} unit={unit} tone={tone} />)}
                  </div>
                ) : <p className="mt-5 rounded-md border border-canopy/10 bg-white p-6 text-sm text-ink/65">Waiting for quality prediction.</p>}
              </div>
              <div className="panel p-6">
                <h2 className="text-2xl font-semibold text-canopy">35-day quality curve</h2>
                <div className="mt-5 h-[420px]"><SvgCurve data={curve} /></div>
              </div>
            </section>
          </div>
        );
      }

      function Layout({ page, setPage, children }) {
        return (
          <div className="min-h-screen">
            <header className="border-b border-canopy/10 bg-mist/90 backdrop-blur">
              <div className="mx-auto flex max-w-7xl flex-col gap-4 px-5 py-4 lg:flex-row lg:items-center lg:justify-between">
                <div className="flex items-center gap-3">
                  <div className="flex h-11 w-11 items-center justify-center rounded-full bg-canopy font-bold text-pulp">FQ</div>
                  <h1 className="text-xl font-semibold text-canopy">Feijoa Quality</h1>
                </div>
                <nav className="flex flex-wrap gap-2">
                  {navItems.map(([key, label]) => (
                    <button
                      key={key}
                      type="button"
                      onClick={() => setPage(key)}
                      className={`focus-ring inline-flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium transition ${page === key ? "bg-canopy text-white" : "bg-white/70 text-canopy hover:bg-white"}`}
                    >
                      <Icon name={label} />
                      {label}
                    </button>
                  ))}
                </nav>
              </div>
            </header>
            <main className="mx-auto max-w-7xl px-5 py-6">{children}</main>
          </div>
        );
      }

      function Home({ setPage }) {
        return (
          <div className="grid gap-4 md:grid-cols-2">
            <section className="panel bg-canopy p-6 text-white">
              <h2 className="text-3xl font-semibold">Feijoa Quality</h2>
              <p className="mt-3 text-pulp">Classify fruit state and predict storage quality.</p>
            </section>
            <div className="grid gap-4">
              <button onClick={() => setPage("results")} className="focus-ring flex items-center justify-between rounded-md border border-canopy/10 bg-white p-5 text-canopy transition hover:-translate-y-0.5 hover:shadow-soft">
                <span className="flex items-center gap-3 font-semibold"><Icon name="Results" />Results</span><span>-&gt;</span>
              </button>
              <button onClick={() => setPage("history")} className="focus-ring flex items-center justify-between rounded-md border border-canopy/10 bg-white p-5 text-canopy transition hover:-translate-y-0.5 hover:shadow-soft">
                <span className="flex items-center gap-3 font-semibold"><Icon name="History" />History</span><span>-&gt;</span>
              </button>
            </div>
          </div>
        );
      }

      function Classify() {
        const [file, setFile] = useState(null);
        const [preview, setPreview] = useState("");
        const [result, setResult] = useState(null);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const sortedScores = useMemo(() => (result?.scores ? Object.entries(result.scores).sort((a, b) => b[1] - a[1]) : []), [result]);
        const tones = { unripe: "bg-leaf", ripe: "bg-pulp", overripe: "bg-ember" };

        const handleFile = (nextFile) => {
          if (!nextFile) return;
          setFile(nextFile);
          setResult(null);
          setError("");
          setPreview(URL.createObjectURL(nextFile));
        };

        const submit = async () => {
          if (!file) return;
          setLoading(true);
          setError("");
          try {
            const formData = new FormData();
            formData.append("image", file);
            const response = await api.post("/predict/classify", formData, { headers: { "Content-Type": "multipart/form-data" } });
            setResult(response.data);
          } catch (err) {
            setError(describeApiError(err, "Classification failed."));
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="space-y-6">
            <div className="grid gap-6 lg:grid-cols-[0.9fr_1.1fr]">
              <section className="panel p-6">
                <h2 className="text-2xl font-semibold text-canopy">Fruit state</h2>
                <label
                  onDragOver={(event) => event.preventDefault()}
                  onDrop={(event) => { event.preventDefault(); handleFile(event.dataTransfer.files?.[0]); }}
                  className="mt-5 flex min-h-72 cursor-pointer flex-col items-center justify-center rounded-md border border-dashed border-canopy/25 bg-white p-6 text-center transition hover:border-leaf hover:bg-leaf/5"
                >
                  {preview ? <img src={preview} alt="Selected feijoa preview" className="max-h-64 rounded-md object-contain" /> : (
                    <><Icon name="Upload" /><span className="mt-3 font-semibold text-canopy">Drop or choose an image</span><span className="mt-1 text-sm text-ink/60">JPEG or PNG</span></>
                  )}
                  <input type="file" accept="image/png,image/jpeg" className="sr-only" onChange={(event) => handleFile(event.target.files?.[0])} />
                </label>
                <button type="button" onClick={submit} disabled={!file || loading} className="focus-ring mt-5 inline-flex w-full items-center justify-center gap-2 rounded-md bg-canopy px-4 py-3 font-semibold text-white transition hover:bg-leaf disabled:cursor-not-allowed disabled:opacity-50">
                  <Icon name="Upload" />{loading ? "Classifying..." : "Run classification"}
                </button>
                {error ? <p className="mt-3 text-sm font-medium text-ember">{error}</p> : null}
              </section>
              <section className="panel p-6">
                <h2 className="text-2xl font-semibold text-canopy">Result</h2>
                {result ? (
                  <div className="mt-5 space-y-5">
                    <div className="rounded-md border border-canopy/10 bg-mist p-5">
                      <div className="mt-2 flex items-end justify-between gap-3">
                        <p className="text-4xl font-semibold capitalize text-canopy">{result.predicted_state}</p>
                        <p className="text-xl font-semibold text-canopy">{(result.confidence * 100).toFixed(1)}%</p>
                      </div>
                      <div className="mt-4 h-3 overflow-hidden rounded-full bg-white">
                        <div className={`h-full ${tones[result.predicted_state] || "bg-leaf"}`} style={{ width: `${result.confidence * 100}%` }} />
                      </div>
                    </div>
                    {sortedScores.map(([label, score]) => (
                      <div key={label}>
                        <div className="mb-1 flex justify-between text-sm"><span className="font-medium capitalize text-canopy">{label}</span><span>{(score * 100).toFixed(2)}%</span></div>
                        <div className="h-2 overflow-hidden rounded-full bg-canopy/10"><div className={`h-full ${tones[label] || "bg-leaf"}`} style={{ width: `${score * 100}%` }} /></div>
                      </div>
                    ))}
                  </div>
                ) : <div className="mt-5 rounded-md border border-canopy/10 bg-white p-6 text-sm text-ink/65">Waiting for an image prediction.</div>}
              </section>
            </div>
            {result ? (
              <QualityPredictionPanel
                title="Storage quality estimate"
                intro={`Model 1 classified this fruit as ${result.predicted_state}. Add the storage and colour measurements for Model 2 to estimate post-harvest quality.`}
              />
            ) : null}
          </div>
        );
      }

      function Predict() {
        return <QualityPredictionPanel autoRun />;
      }

      function Results() {
        return (
          <div className="space-y-6">
            <Classify />
            <Predict />
          </div>
        );
      }

      function HistoryPage() {
        const [data, setData] = useState(null);
        const [page, setPage] = useState(0);
        const [error, setError] = useState("");
        const limit = 20;

        useEffect(() => {
          setError("");
          api.get("/history", { params: { limit, offset: page * limit } })
            .then((response) => setData(response.data))
            .catch((err) => setError(describeApiError(err, "History failed.")));
        }, [page]);

        if (error) return <section className="panel p-6 text-sm font-medium text-ember">{error}</section>;
        if (!data) return <section className="panel p-6 text-sm text-ink/65">Loading history.</section>;

        return (
          <section className="panel overflow-hidden">
            <div className="border-b border-canopy/10 p-6">
              <h2 className="text-2xl font-semibold text-canopy">Prediction history</h2>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full min-w-[760px] text-left text-sm">
                <thead className="bg-canopy text-white">
                  <tr><th className="px-4 py-3">Timestamp</th><th className="px-4 py-3">Model</th><th className="px-4 py-3">Input</th><th className="px-4 py-3">Result</th></tr>
                </thead>
                <tbody>
                  {data.predictions.map((item) => (
                    <tr key={item.id} className="border-b border-canopy/10 bg-white align-top">
                      <td className="px-4 py-3 text-ink/70">{new Date(item.timestamp).toLocaleString()}</td>
                      <td className="px-4 py-3 font-semibold capitalize text-canopy">{item.model}</td>
                      <td className="px-4 py-3 text-ink/70">{item.input_summary}</td>
                      <td className="px-4 py-3"><pre className="max-w-xl whitespace-pre-wrap rounded-md bg-mist p-3 text-xs text-ink/75">{JSON.stringify(item.result, null, 2)}</pre></td>
                    </tr>
                  ))}
                  {!data.predictions.length ? <tr><td colSpan="4" className="bg-white px-4 py-10 text-center text-ink/60">No predictions saved yet.</td></tr> : null}
                </tbody>
              </table>
            </div>
            <div className="flex items-center justify-between border-t border-canopy/10 bg-white px-6 py-4">
              <button disabled={page === 0} onClick={() => setPage((value) => Math.max(0, value - 1))} className="focus-ring rounded-md bg-mist px-3 py-2 text-sm font-semibold text-canopy disabled:opacity-40">Previous</button>
              <span className="text-sm text-ink/60">Page {page + 1}</span>
              <button disabled={(page + 1) * limit >= data.total} onClick={() => setPage((value) => value + 1)} className="focus-ring rounded-md bg-mist px-3 py-2 text-sm font-semibold text-canopy disabled:opacity-40">Next</button>
            </div>
          </section>
        );
      }

      function App() {
        const [page, setPage] = useState("home");
        const pages = {
          home: <Home setPage={setPage} />,
          results: <Results />,
          history: <HistoryPage />,
        };
        return <Layout page={page} setPage={setPage}>{pages[page] || pages.home}</Layout>;
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
